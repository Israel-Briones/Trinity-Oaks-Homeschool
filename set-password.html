<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear contraseña · Trinity Oaks Homeschool</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
    }

    .sp-card {
      background: #141414;
      border: 1px solid rgba(184,115,51,.2);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: min(440px, 100%);
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
    }

    .sp-logo { margin-bottom: .25rem; }

    .sp-eyebrow {
      font-size: .72rem; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--copper);
    }

    .sp-title {
      font-family: 'Fraunces', serif;
      font-size: 1.6rem; font-weight: 600;
      color: var(--cream); margin: 0; text-align: center;
    }

    .sp-subtitle {
      font-size: .88rem; color: var(--muted);
      text-align: center; margin: 0; line-height: 1.6;
    }

    .sp-fields {
      display: flex; flex-direction: column; gap: .75rem; width: 100%;
    }

    .sp-label {
      font-size: .72rem; font-weight: 600;
      color: var(--muted); letter-spacing: .08em;
      text-transform: uppercase; margin-bottom: .3rem;
    }

    .sp-input {
      font-family: 'Inter', sans-serif;
      width: 100%; box-sizing: border-box;
      background: #1a1a1a; border: 1px solid #333;
      border-radius: 8px; color: var(--cream);
      font-size: 1rem; padding: .75rem 1rem;
      outline: none; transition: border-color .2s;
    }
    .sp-input:focus { border-color: var(--copper); }
    .sp-input::placeholder { color: #555; }
    .sp-input[readonly] { color: var(--muted); cursor: default; }

    .sp-btn {
      font-family: 'Inter', sans-serif;
      width: 100%; background: var(--copper);
      color: #0D0D0D; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 700; padding: .85rem;
      cursor: pointer; transition: background .2s, transform .1s;
      margin-top: .25rem;
    }
    .sp-btn:hover  { background: var(--copper2); }
    .sp-btn:active { transform: scale(.98); }
    .sp-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .sp-error {
      font-size: .85rem; color: #e07070;
      text-align: center; width: 100%; margin: 0;
    }

    .sp-success {
      font-size: .88rem; color: #7aab4a;
      text-align: center; width: 100%; margin: 0;
    }

    .sp-back {
      font-size: .82rem; color: var(--muted);
      text-decoration: none; transition: color .2s;
      margin-top: .25rem;
    }
    .sp-back:hover { color: var(--cream); }
  </style>
</head>
<body>

<div class="sp-card">
  <img src="Logo 2.png" height="70" alt="Trinity Oaks" class="sp-logo">
  <div class="sp-eyebrow">Bienvenida a Trinity Oaks</div>
  <h1 class="sp-title">Crea tu contraseña</h1>
  <p class="sp-subtitle">Tu suscripción está activa. Crea una contraseña para acceder a tu panel de familia.</p>

  <div class="sp-fields">
    <div>
      <div class="sp-label">Correo electrónico</div>
      <input id="sp-email" class="sp-input" type="email" readonly placeholder="tucorreo@ejemplo.com">
    </div>
    <div>
      <div class="sp-label">Contraseña</div>
      <input id="sp-password" class="sp-input" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
    </div>
    <div>
      <div class="sp-label">Confirmar contraseña</div>
      <input id="sp-confirm" class="sp-input" type="password" placeholder="Repite tu contraseña" autocomplete="new-password">
    </div>
  </div>

  <p id="sp-error"   class="sp-error"   hidden></p>
  <p id="sp-success" class="sp-success" hidden></p>

  <button id="sp-btn" class="sp-btn">Crear contraseña</button>
  <a href="index.html" class="sp-back">← Volver al inicio</a>
</div>

<script>
  const API     = 'https://trinity-oaks-api-production.up.railway.app';
  const HEADERS = { 'Content-Type': 'application/json', 'x-api-key': 'to-api-2025-secure' };

  // Pre-fill email from ?email= URL param, fallback to localStorage
  const params = new URLSearchParams(window.location.search);
  const emailFromUrl = params.get('email') || localStorage.getItem('to_email') || '';
  document.getElementById('sp-email').value = emailFromUrl;

  const btn       = document.getElementById('sp-btn');
  const errorEl   = document.getElementById('sp-error');
  const successEl = document.getElementById('sp-success');

  btn.addEventListener('click', submitPassword);
  document.getElementById('sp-confirm').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitPassword();
  });

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function submitPassword() {
    const email    = document.getElementById('sp-email').value.trim();
    const password = document.getElementById('sp-password').value;
    const confirm  = document.getElementById('sp-confirm').value;

    errorEl.hidden   = true;
    successEl.hidden = true;

    if (!email) { showError('No se encontró el correo. Vuelve a la página de inicio.'); return; }
    if (password.length < 8) { showError('La contraseña debe tener al menos 8 caracteres.'); return; }
    if (password !== confirm) { showError('Las contraseñas no coinciden.'); return; }

    btn.disabled = true;
    btn.textContent = 'Guardando...';

    try {
      const password_hash = await sha256(password);
      const res = await fetch(`${API}/set-password`, {
        method: 'POST',
        headers: HEADERS,
        body: JSON.stringify({ email, password_hash })
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || 'Error del servidor');
      }

      localStorage.setItem('to_email', email);
      successEl.textContent = '¡Contraseña creada! Redirigiendo...';
      successEl.hidden = false;
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Crear contraseña';
      showError(err.message || 'Hubo un error. Por favor intenta de nuevo.');
    }
  }

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.hidden = false;
  }
</script>
</body>
</html>
