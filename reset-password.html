<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña · Trinity Oaks Homeschool</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
    }

    .rp-card {
      background: #141414;
      border: 1px solid rgba(184,115,51,.2);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: min(440px, 100%);
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
    }

    .rp-logo { margin-bottom: .25rem; }

    .rp-eyebrow {
      font-size: .72rem; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--copper);
    }

    .rp-title {
      font-family: 'Fraunces', serif;
      font-size: 1.6rem; font-weight: 600;
      color: var(--cream); margin: 0; text-align: center;
    }

    .rp-subtitle {
      font-size: .88rem; color: var(--muted);
      text-align: center; margin: 0; line-height: 1.6;
    }

    .rp-fields {
      display: flex; flex-direction: column; gap: .75rem; width: 100%;
    }

    .rp-label {
      font-size: .72rem; font-weight: 600;
      color: var(--muted); letter-spacing: .08em;
      text-transform: uppercase; margin-bottom: .3rem;
    }

    .rp-input {
      font-family: 'Inter', sans-serif;
      width: 100%; box-sizing: border-box;
      background: #1a1a1a; border: 1px solid #333;
      border-radius: 8px; color: var(--cream);
      font-size: 1rem; padding: .75rem 1rem;
      outline: none; transition: border-color .2s;
    }
    .rp-input:focus { border-color: var(--copper); }
    .rp-input::placeholder { color: #555; }

    .rp-btn {
      font-family: 'Inter', sans-serif;
      width: 100%; background: var(--copper);
      color: #0D0D0D; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 700; padding: .85rem;
      cursor: pointer; transition: background .2s, transform .1s;
      margin-top: .25rem;
    }
    .rp-btn:hover  { background: var(--copper2); }
    .rp-btn:active { transform: scale(.98); }
    .rp-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .rp-error {
      font-size: .85rem; color: #e07070;
      text-align: center; width: 100%; margin: 0;
    }

    .rp-success {
      font-size: .88rem; color: #7aab4a;
      text-align: center; width: 100%; margin: 0;
    }

    .rp-back {
      font-size: .82rem; color: var(--muted);
      text-decoration: none; transition: color .2s;
      margin-top: .25rem;
    }
    .rp-back:hover { color: var(--cream); }

    .rp-invalid {
      text-align: center;
    }
    .rp-invalid p {
      font-size: .9rem; color: var(--muted); margin-bottom: 1rem;
    }
  </style>
</head>
<body>

<div class="rp-card">
  <img src="Logo 2.png" height="70" alt="Trinity Oaks" class="rp-logo">
  <div class="rp-eyebrow">Seguridad de cuenta</div>
  <h1 class="rp-title">Nueva contraseña</h1>

  <div id="rp-body">
    <!-- filled by JS -->
  </div>
</div>

<script>
  const API     = 'https://trinity-oaks-api-production.up.railway.app';
  const HEADERS = { 'Content-Type': 'application/json', 'x-api-key': 'to-api-2025-secure' };

  const token = new URLSearchParams(window.location.search).get('token');
  const body  = document.getElementById('rp-body');

  if (!token) {
    body.innerHTML = `
      <div class="rp-invalid">
        <p>Este enlace no es válido o ya fue utilizado.</p>
        <a href="index.html" class="rp-back">← Volver al inicio</a>
      </div>`;
  } else {
    body.innerHTML = `
      <p class="rp-subtitle" style="margin:0;">Elige una contraseña segura para tu cuenta.</p>
      <div class="rp-fields">
        <div>
          <div class="rp-label">Nueva contraseña</div>
          <input id="rp-password" class="rp-input" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
        </div>
        <div>
          <div class="rp-label">Confirmar contraseña</div>
          <input id="rp-confirm" class="rp-input" type="password" placeholder="Repite tu contraseña" autocomplete="new-password">
        </div>
      </div>
      <p id="rp-error"   class="rp-error"   hidden></p>
      <p id="rp-success" class="rp-success" hidden></p>
      <button id="rp-btn" class="rp-btn">Guardar contraseña</button>
      <a href="index.html" class="rp-back">← Volver al inicio</a>`;

    const btn       = document.getElementById('rp-btn');
    const errorEl   = document.getElementById('rp-error');
    const successEl = document.getElementById('rp-success');

    btn.addEventListener('click', submit);
    document.getElementById('rp-confirm').addEventListener('keydown', e => {
      if (e.key === 'Enter') submit();
    });

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function submit() {
      const password = document.getElementById('rp-password').value;
      const confirm  = document.getElementById('rp-confirm').value;

      errorEl.hidden   = true;
      successEl.hidden = true;

      if (password.length < 8) { showError('La contraseña debe tener al menos 8 caracteres.'); return; }
      if (password !== confirm) { showError('Las contraseñas no coinciden.'); return; }

      btn.disabled = true;
      btn.textContent = 'Guardando...';

      try {
        const password_hash = await sha256(password);
        const res = await fetch(`${API}/reset-password`, {
          method: 'POST',
          headers: HEADERS,
          body: JSON.stringify({ token, password_hash })
        });

        const data = await res.json().catch(() => ({}));

        if (res.status === 400) {
          throw new Error('Token inválido o expirado. Solicita un nuevo enlace.');
        }
        if (!res.ok) throw new Error(data.error || 'Error del servidor');

        if (data.email) localStorage.setItem('to_email', data.email);

        successEl.textContent = '¡Contraseña actualizada! Redirigiendo...';
        successEl.hidden = false;
        btn.hidden = true;
        setTimeout(() => { window.location.href = 'index.html'; }, 1800);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Guardar contraseña';
        showError(err.message || 'Hubo un error. Por favor intenta de nuevo.');
      }
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.hidden = false;
    }
  }
</script>
</body>
</html>
