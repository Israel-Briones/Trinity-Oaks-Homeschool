<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Trinity Oaks Homeschool</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap">
  <style>
    /* ── Welcome hero ── */
    .dash-hero {
      padding: 3rem 2rem 2.5rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border2);
      position: relative; overflow: hidden;
    }
    .dash-hero::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, transparent, var(--copper), transparent);
      opacity: 0.4;
    }
    .dash-hero-inner { max-width: 1100px; margin: 0 auto; padding-left: 3rem; }
    .dash-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--copper); margin-bottom: 0.75rem;
    }
    .dash-eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--copper); }
    .dash-title {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      font-weight: 600; color: var(--cream);
      margin-bottom: 0.4rem; letter-spacing: -0.02em;
    }
    .dash-title em { font-style: italic; color: var(--copper); }
    .dash-email { font-size: 0.88rem; color: var(--muted); }

    /* ── Section wrappers ── */
    .dash-wrap       { padding: 3.5rem 2rem; background: var(--bg); }
    .dash-wrap-alt   { padding: 3.5rem 2rem; background: var(--bg2); }
    .dash-inner      { max-width: 1100px; margin: 0 auto; }

    .dash-sec-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;
    }
    .dash-sec-label {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--copper); margin-bottom: 0.4rem;
      display: flex; align-items: center; gap: 8px;
    }
    .dash-sec-label::after { content: ''; width: 32px; height: 1px; background: var(--copper); }
    .dash-sec-title {
      font-family: 'Fraunces', serif;
      font-size: 1.6rem; font-weight: 600; color: var(--cream);
    }

    /* ── Hijo cards ── */
    .hijos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }
    .hijo-card {
      border: 1px solid var(--border); border-radius: 8px;
      padding: 1.75rem; background: var(--bg2);
      display: flex; flex-direction: column; gap: 0.65rem;
      transition: border-color .2s;
    }
    .hijo-card:hover { border-color: var(--copper); }
    .hijo-card-header {
      display: flex; align-items: center; gap: 0.75rem;
      padding-bottom: 0.9rem; border-bottom: 1px solid var(--border2);
    }
    .hijo-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(184,115,51,.15); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif; font-size: 1.1rem; color: var(--copper);
      flex-shrink: 0;
    }
    .hijo-nombre {
      font-family: 'Fraunces', serif;
      font-size: 1.1rem; font-weight: 600; color: var(--cream);
    }
    .hijo-row {
      display: flex; justify-content: space-between; align-items: center;
    }
    .hijo-row-label {
      font-size: 0.72rem; font-weight: 600; color: var(--muted);
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .hijo-row-val { font-size: 0.88rem; color: var(--cream); font-weight: 500; }
    .hijo-mes-badge {
      background: rgba(184,115,51,.15); border: 1px solid var(--border);
      color: var(--copper); border-radius: 4px;
      padding: 0.2rem 0.6rem; font-size: 0.75rem; font-weight: 600;
    }
    .hijo-ver-btn {
      margin-top: 0.4rem; width: 100%; padding: 0.7rem;
      border: 1px solid var(--border); border-radius: 6px;
      background: transparent; color: var(--cream);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all .2s; letter-spacing: 0.02em;
    }
    .hijo-ver-btn:hover { border-color: var(--copper); color: var(--copper); }

    /* dashed add card */
    .hijo-card-add {
      border: 1px dashed rgba(184,115,51,.3); border-radius: 8px;
      background: transparent;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.75rem; min-height: 180px;
      cursor: pointer; transition: border-color .2s, background .2s;
    }
    .hijo-card-add:hover {
      border-color: var(--copper);
      background: rgba(184,115,51,.04);
    }
    .hijo-add-icon {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid var(--copper);
      display: flex; align-items: center; justify-content: center;
      color: var(--copper); font-size: 1.4rem; line-height: 1;
    }
    .hijo-add-label { font-size: 0.88rem; color: var(--muted); text-align: center; }

    /* ── Plan card ── */
    .plan-info-card {
      border: 1px solid var(--copper); border-radius: 8px;
      padding: 2rem; background: var(--bg3);
      max-width: 480px;
      display: flex; flex-direction: column; gap: 1.25rem;
    }
    .plan-info-name {
      font-family: 'Fraunces', serif;
      font-size: 1.7rem; font-weight: 600; color: var(--copper);
    }
    .plan-info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.6rem 0; border-bottom: 1px solid var(--border2);
    }
    .plan-info-row:last-of-type { border-bottom: none; }
    .plan-info-key {
      font-size: 0.75rem; font-weight: 600; color: var(--muted);
      letter-spacing: 0.07em; text-transform: uppercase;
    }
    .plan-info-val { font-size: 0.9rem; color: var(--cream); font-weight: 500; }
    .plan-active-badge {
      background: rgba(61,74,42,.4); border: 1px solid rgba(61,74,42,.8);
      color: #7aab4a; border-radius: 4px;
      padding: 0.2rem 0.7rem; font-size: 0.75rem; font-weight: 600;
    }
    .no-plan-card {
      border: 1px dashed rgba(184,115,51,.3); border-radius: 8px;
      padding: 2.5rem 2rem; max-width: 480px;
      display: flex; flex-direction: column; align-items: center;
      gap: 0.75rem; text-align: center;
    }
    .no-plan-card p { font-size: 0.9rem; color: var(--muted); }
    .no-plan-card a { font-size: 0.9rem; color: var(--copper); font-weight: 600; text-decoration: none; }
    .no-plan-card a:hover { text-decoration: underline; }

    /* ── Portal button ── */
    .btn-portal {
      background: transparent; color: var(--copper);
      border: 1px solid var(--copper); border-radius: 6px;
      padding: 0.85rem 1.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
      letter-spacing: 0.02em; align-self: flex-start;
    }
    .btn-portal:hover { background: var(--copper); color: var(--bg); }
    .btn-portal:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Add hijo modal ── */
    @keyframes dashFadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes dashSlideUp { from{opacity:0;transform:translateY(24px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }

    .ah-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.75);
      display: flex; align-items: center; justify-content: center;
      animation: dashFadeIn .2s ease;
    }
    .ah-overlay[hidden] { display: none; }
    .ah-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 16px; padding: 2rem;
      width: min(440px, 90vw);
      display: flex; flex-direction: column; gap: 1rem;
      animation: dashSlideUp .25s cubic-bezier(.22,.68,0,1.2);
    }
    .ah-title {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem; font-weight: 600; color: var(--cream);
    }
    .ah-field-label {
      font-size: 0.72rem; font-weight: 600; color: var(--muted);
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.35rem;
    }
    .ah-input, .ah-select {
      font-family: 'Inter', sans-serif;
      width: 100%; box-sizing: border-box;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--cream);
      font-size: 0.95rem; padding: .7rem 1rem;
      outline: none; transition: border-color .2s;
    }
    .ah-input:focus, .ah-select:focus { border-color: var(--copper); }
    .ah-input::placeholder { color: var(--muted); }
    .ah-select option { background: var(--bg3); }
    .ah-actions { display: flex; gap: 0.75rem; margin-top: 0.25rem; }
    .ah-btn {
      flex: 1; padding: 0.8rem; border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: all .2s;
    }
    .ah-btn-primary { background: var(--copper); color: var(--bg); border: none; }
    .ah-btn-primary:hover { background: var(--copper2); }
    .ah-btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    .ah-btn-ghost:hover { color: var(--cream); border-color: var(--cream); }

    /* ── Nav tweaks for dashboard ── */
    .nav-title {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center;
      gap: 0.1rem;
      pointer-events: none;
    }
    .nav-title-main {
      font-family: 'Cinzel', serif;
      font-size: 2.1rem; font-weight: 700;
      color: var(--cream);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
      line-height: 1;
    }
    .nav-title-sub {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem; font-weight: 700;
      color: var(--cream);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .nav-user-label { font-size: 0.82rem; color: var(--cream); font-weight: 500; }
    .nav-logout-link {
      font-size: 0.82rem; color: var(--muted);
      text-decoration: none; transition: color .2s;
    }
    .nav-logout-link:hover { color: var(--copper); }

    @media(max-width:640px) {
      .dash-hero-inner { padding-left: 1rem; }
      .plan-info-card, .no-plan-card { max-width: 100%; }
      .dash-wrap, .dash-wrap-alt { padding: 2.5rem 1rem; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">
    <img src="Logo 2.png" height="205" alt="Trinity Oaks">
  </div>
  <span class="nav-title-main" style="position:absolute;left:50%;transform:translateX(-50%);font-size:3rem;pointer-events:none;">Dashboard</span>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.35rem;margin-right:2rem;">
    <span class="nav-user-label" id="nav-user-name"></span>
    <a href="index.html" class="nav-logout-link" style="font-size:0.82rem;">Inicio</a>
    <a href="#" class="nav-logout-link" id="nav-logout">Cerrar sesión</a>
  </div>
</nav>

<!-- WELCOME HERO -->
<div class="dash-hero">
  <div class="dash-hero-inner">
    <div class="dash-eyebrow">Panel de familia</div>
    <h1 class="dash-title">Bienvenida, <em id="dash-name"></em></h1>
    <p class="dash-email" id="dash-email"></p>
  </div>
</div>

<!-- MIS HIJOS -->
<div class="dash-wrap">
  <div class="dash-inner">
    <div class="dash-sec-header">
      <div>
        <div class="dash-sec-label">Educación en casa</div>
        <h2 class="dash-sec-title">Mis Hijos</h2>
      </div>
      <button class="btn-primary" id="btn-agregar-hijo"
        style="border-radius:6px;font-size:0.85rem;padding:0.65rem 1.25rem;">
        + Agregar hijo
      </button>
    </div>
    <div class="hijos-grid" id="hijos-grid"></div>
  </div>
</div>

<!-- MI PLAN -->
<div class="dash-wrap-alt">
  <div class="dash-inner">
    <div style="margin-bottom:2rem;">
      <div class="dash-sec-label">Suscripción activa</div>
      <h2 class="dash-sec-title">Mi Plan</h2>
    </div>
    <div id="plan-container"></div>
  </div>
</div>

<!-- ADD HIJO MODAL -->
<div id="add-hijo-modal" class="ah-overlay" hidden>
  <div class="ah-card">
    <h2 class="ah-title">Agregar hijo</h2>
    <div>
      <div class="ah-field-label">Nombre</div>
      <input id="ah-nombre" class="ah-input" type="text" placeholder="Nombre del hijo">
    </div>
    <div>
      <div class="ah-field-label">Nivel escolar</div>
      <select id="ah-nivel" class="ah-select">
        <option value="">Seleccionar nivel</option>
        <option>Kínder</option>
        <option>1° Primaria</option>
        <option>2° Primaria</option>
        <option>3° Primaria</option>
        <option>4° Primaria</option>
        <option>5° Primaria</option>
        <option>6° Primaria</option>
        <option>1° Secundaria</option>
        <option>2° Secundaria</option>
        <option>3° Secundaria</option>
      </select>
    </div>
    <div>
      <div class="ah-field-label">Mes activo</div>
      <select id="ah-mes" class="ah-select">
        <option>Mes 1 — Agosto</option>
        <option>Mes 2 — Septiembre</option>
        <option>Mes 3 — Octubre</option>
        <option>Mes 4 — Noviembre</option>
        <option>Mes 5 — Diciembre</option>
        <option>Mes 6 — Enero</option>
        <option>Mes 7 — Febrero</option>
        <option>Mes 8 — Marzo</option>
        <option>Mes 9 — Abril</option>
        <option>Mes 10 — Mayo</option>
        <option>Mes 11 — Junio</option>
        <option>Mes 12 — Julio</option>
      </select>
    </div>
    <div class="ah-actions">
      <button class="ah-btn ah-btn-ghost" id="ah-cancel">Cancelar</button>
      <button class="ah-btn ah-btn-primary" id="ah-submit">Agregar</button>
    </div>
  </div>
</div>

<script>
  const API     = 'https://trinity-oaks-api-production.up.railway.app';
  const HEADERS = { 'Content-Type': 'application/json', 'x-api-key': 'to-api-2025-secure' };

  // Auth guard — must run before any render
  const email = localStorage.getItem('to_email');
  if (!email) { window.location.replace('index.html'); }

  // ── Identity ──────────────────────────────────────────────
  function nameFromEmail(e) {
    const local = e.split('@')[0].replace(/[._-]/g, ' ');
    return local.replace(/\b\w/g, c => c.toUpperCase());
  }
  const displayName = nameFromEmail(email || '');
  document.getElementById('dash-name').textContent     = displayName;
  document.getElementById('dash-email').textContent    = email;
  document.getElementById('nav-user-name').textContent = displayName;

  // ── Logout ────────────────────────────────────────────────
  document.getElementById('nav-logout').addEventListener('click', e => {
    e.preventDefault();
    ['to_email','to_plan','to_billing','to_hijos'].forEach(k => localStorage.removeItem(k));
    window.location.href = 'index.html';
  });

  // ── Hijos (localStorage) ──────────────────────────────────
  function loadHijos() {
    try { return JSON.parse(localStorage.getItem('to_hijos') || '[]'); }
    catch { return []; }
  }
  function saveHijos(hijos) { localStorage.setItem('to_hijos', JSON.stringify(hijos)); }

  function renderHijos() {
    const hijos = loadHijos();
    const grid  = document.getElementById('hijos-grid');
    grid.innerHTML = '';

    hijos.forEach((h, i) => {
      const card = document.createElement('div');
      card.className = 'hijo-card';
      card.innerHTML = `
        <div class="hijo-card-header">
          <div class="hijo-avatar">${h.nombre.charAt(0).toUpperCase()}</div>
          <span class="hijo-nombre">${escHtml(h.nombre)}</span>
        </div>
        <div class="hijo-row">
          <span class="hijo-row-label">Nivel</span>
          <span class="hijo-row-val">${escHtml(h.nivel)}</span>
        </div>
        <div class="hijo-row">
          <span class="hijo-row-label">Mes activo</span>
          <span class="hijo-mes-badge">${escHtml(h.mes)}</span>
        </div>
        <button class="hijo-ver-btn" data-idx="${i}">Ver material →</button>
      `;
      grid.appendChild(card);
    });

    // Dashed add card
    const addCard = document.createElement('button');
    addCard.className = 'hijo-card-add';
    addCard.innerHTML = `<div class="hijo-add-icon">+</div><span class="hijo-add-label">Agregar otro hijo</span>`;
    addCard.addEventListener('click', openAddHijo);
    grid.appendChild(addCard);

    grid.querySelectorAll('.hijo-ver-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const h = loadHijos()[+btn.dataset.idx];
        window.location.href = `material.html?hijo_id=${h.id}&nombre=${encodeURIComponent(h.nombre)}&nivel=${encodeURIComponent(h.nivel)}&mes=${h.mes}`;
      });
    });
  }

  // ── Add hijo modal ────────────────────────────────────────
  document.getElementById('btn-agregar-hijo').addEventListener('click', openAddHijo);

  function openAddHijo() {
    document.getElementById('ah-nombre').value = '';
    document.getElementById('ah-nivel').value  = '';
    document.getElementById('ah-mes').selectedIndex = 0;
    document.getElementById('add-hijo-modal').hidden = false;
    document.getElementById('ah-nombre').focus();
  }

  document.getElementById('ah-cancel').addEventListener('click', () => {
    document.getElementById('add-hijo-modal').hidden = true;
  });
  document.getElementById('add-hijo-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.hidden = true;
  });

  document.getElementById('ah-submit').addEventListener('click', () => {
    const nombre = document.getElementById('ah-nombre').value.trim();
    const nivel  = document.getElementById('ah-nivel').value;
    const mes    = document.getElementById('ah-mes').value;
    if (!nombre || !nivel) { document.getElementById(nombre ? 'ah-nivel' : 'ah-nombre').focus(); return; }
    const hijos = loadHijos();
    hijos.push({ nombre, nivel, mes });
    saveHijos(hijos);
    document.getElementById('add-hijo-modal').hidden = true;
    renderHijos();
  });

  // ── Plan ─────────────────────────────────────────────────
  const PLAN_LABELS    = { individual: 'Individual', familiar: 'Familiar', plus: 'Plus' };
  const BILLING_LABELS = { monthly: 'Mensual', annual: 'Anual' };

  function renderPlan() {
    const plan    = localStorage.getItem('to_plan');
    const billing = localStorage.getItem('to_billing');
    const container = document.getElementById('plan-container');

    if (!plan) {
      container.innerHTML = `
        <div class="no-plan-card">
          <p>No se encontró un plan activo en este dispositivo.</p>
          <a href="index.html#planes">Ver planes disponibles →</a>
        </div>`;
      return;
    }

    container.innerHTML = `
      <div class="plan-info-card">
        <div>
          <div style="font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;">Plan activo</div>
          <div class="plan-info-name">${PLAN_LABELS[plan] || plan}</div>
        </div>
        <div>
          <div class="plan-info-row">
            <span class="plan-info-key">Facturación</span>
            <span class="plan-info-val">${BILLING_LABELS[billing] || billing}</span>
          </div>
          <div class="plan-info-row">
            <span class="plan-info-key">Estado</span>
            <span class="plan-active-badge">Activo</span>
          </div>
          <div class="plan-info-row">
            <span class="plan-info-key">Correo</span>
            <span class="plan-info-val">${escHtml(email)}</span>
          </div>
        </div>
        <button class="btn-portal" id="btn-portal">Gestionar suscripción →</button>
      </div>`;

    document.getElementById('btn-portal').addEventListener('click', openPortal);
  }

  async function openPortal() {
    const btn = document.getElementById('btn-portal');
    btn.disabled = true; btn.textContent = 'Cargando...';
    try {
      const res = await fetch(`${API}/create-portal`, {
        method: 'POST', headers: HEADERS,
        body: JSON.stringify({ email })
      });
      if (!res.ok) throw new Error('Error del servidor');
      const data = await res.json();
      if (!data.url) throw new Error('URL no recibida');
      window.location.href = data.url;
    } catch (err) {
      console.error(err);
      btn.disabled = false; btn.textContent = 'Gestionar suscripción →';
      alert('No se pudo abrir el portal. Por favor intenta de nuevo.');
    }
  }

  // ── Helpers ───────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ─────────────────────────────────────────────────
  renderHijos();
  renderPlan();
</script>
</body>
</html>
