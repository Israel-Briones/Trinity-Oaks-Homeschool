<svg xmlns="http://www.w3.org/2000/svg" width="200" height="220" viewBox="0 0 200 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27ae60"/>
      <stop offset="100%" stop-color="#145a32"/>
    </linearGradient>
    <linearGradient id="medal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1c40f"/>
      <stop offset="100%" stop-color="#c8873a"/>
    </linearGradient>
  </defs>
  <polygon points="102,12 184,56 184,152 102,196 20,152 20,56" fill="rgba(0,0,0,0.4)"/>
  <polygon points="100,8 182,52 182,148 100,192 18,148 18,52" fill="url(#bg)" stroke="#c8873a" stroke-width="4"/>
  <polygon points="100,22 170,61 170,139 100,178 30,139 30,61" fill="none" stroke="#c8873a" stroke-width="1.5" opacity="0.4"/>
  <!-- Ribbon -->
  <polygon points="88,68 100,78 112,68 108,90 100,84 92,90" fill="#e74c3c"/>
  <polygon points="92,68 100,76 108,68 105,56 100,62 95,56" fill="#c0392b"/>
  <!-- Medal circle -->
  <circle cx="100" cy="112" r="32" fill="url(#medal)" stroke="#c8873a" stroke-width="2"/>
  <circle cx="100" cy="112" r="26" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Number 10 -->
  <text x="100" y="120" text-anchor="middle" font-family="Georgia,serif" font-size="26" font-weight="bold" fill="white">10</text>
  <!-- Connecting ribbon to medal -->
  <rect x="95" y="86" width="10" height="10" fill="#e74c3c"/>
  <text x="100" y="210" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-weight="bold" fill="#c8873a">DEDICADO</text>
</svg>
