  <path d="M 122,76 Q 136,84 134,96 Q 132,106 120,104" fill="none" stroke="url(#trophy)" stroke-width="5" stroke-linecap="round"/>
  <!-- Trophy stem -->
  <rect x="94" y="110" width="12" height="16" fill="#c8873a"/>
  <rect x="82" y="126" width="36" height="6" rx="3" fill="url(#trophy)"/>
  <!-- Gem star on trophy -->
  <polygon points="100,80 104,90 115,90 106,97 110,107 100,100 90,107 94,97 85,90 96,90" fill="white" opacity="0.9"/>
  <circle cx="100" cy="92" r="5" fill="#e91e8c"/>
  <text x="100" y="210" text-anchor="middle" font-family="Georgia,serif" font-size="11" font-weight="bold" fill="#c8873a">MES PERFECTO</text>
</svg>
