<svg xmlns="http://www.w3.org/2000/svg" width="200" height="220" viewBox="0 0 200 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#bf360c"/>
    </linearGradient>
  </defs>
  <polygon points="102,12 184,56 184,152 102,196 20,152 20,56" fill="rgba(0,0,0,0.4)"/>
  <polygon points="100,8 182,52 182,148 100,192 18,148 18,52" fill="url(#bg)" stroke="#c8873a" stroke-width="4"/>
  <polygon points="100,22 170,61 170,139 100,178 30,139 30,61" fill="none" stroke="#c8873a" stroke-width="1.5" opacity="0.4"/>
  <!-- Apple body -->
  <circle cx="100" cy="106" r="36" fill="#e74c3c"/>
  <!-- Apple shine -->
  <ellipse cx="88" cy="90" rx="8" ry="12" fill="white" opacity="0.2" transform="rotate(-20,88,90)"/>
  <!-- Apple stem -->
  <path d="M 100,70 Q 108,62 114,66" fill="none" stroke="#8B5E3C" stroke-width="3" stroke-linecap="round"/>
  <!-- Apple leaf -->
  <ellipse cx="110" cy="68" rx="8" ry="5" fill="#2ecc71" transform="rotate(-30,110,68)"/>
  <!-- Apple indent top -->
  <path d="M 94,72 Q 100,68 106,72" fill="none" stroke="#c0392b" stroke-width="2"/>
  <!-- Star badge on apple -->
  <circle cx="100" cy="108" r="18" fill="#f1c40f" opacity="0.95"/>
  <polygon points="100,94 103,104 114,104 106,111 109,121 100,115 91,121 94,111 86,104 97,104" fill="#ff8f00"/>
  <!-- Star center -->
  <circle cx="100" cy="108" r="5" fill="#f1c40f"/>
  <text x="100" y="210" text-anchor="middle" font-family="Georgia,serif" font-size="10" font-weight="bold" fill="#c8873a">INICIO DE CICLO</text>
</svg>
